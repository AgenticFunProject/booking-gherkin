spring:
  application:
    name: booking-gherkin-app
  profiles:
    default: local
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

booking:
  security:
    enabled: false
    jwt:
      issuer: test-issuer
      audience: equipments-service
      secret: booking-gherkin-test-secret-for-hs256-validation
